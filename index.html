<!DOCTYPE html>
<html lang="en">
<head>

<title>Stream Overlay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<video autoplay muted loop playsinline id="bgVideo">

</video>

        <span id="clock"></span>

        Mindjárt jövök
    </div>

    <div class="box" id="gifBox">
        <img src="assets/dumbahh.gif" alt="gif">
    </div>

    <div class="box" id="chat">
    </div>

    <div class="box" id="twitch">
        <span>
            <img class="icon" src="assets/twitch.png" alt="twitch">
            krxztyan
        </span>
    </div>

    <div class="box" id="insta">
        <span>
            <img class="icon" src="assets/instagram.png" alt="instagram">
            krxztyan.ig
        </span>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
